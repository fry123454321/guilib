<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>imgui-ws : demo-null</title>
    <script src="/data/incppect.js"></script>
    <script src="/data/imgui-ws.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Georgia, serif;
        }
        canvas {
            display: block;
            background-color: black
        }
        canvas_alt {
            cursor: none;
        }
    </style>
</head>
<body>
    <div id="client-info"></div>
    <canvas id="canvas_main"></canvas>

    <script>
        // Функция изменения размера canvas
        const canvas = document.getElementById('canvas_main');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Основная логика
        function init() {
            const output = document.getElementById('client-info');

            incppect.render = function() {
                imgui_ws.gl.clearColor(0.45, 0.99, 0.60, 1.00);
                imgui_ws.gl.clear(imgui_ws.gl.COLOR_BUFFER_BIT);

                imgui_ws.incppect_textures(this);
                imgui_ws.incppect_draw_lists(this);
                imgui_ws.render();

                const myId = this.get_int32('my_id[%d]', -1) || 0;
                // output.innerHTML = 'Your client Id: ' + myId;
                // Убрана строка output.innerHTML = '' – она стирала вывод
            };

            incppect.onerror = function(evt) {
                if (typeof evt === 'object') {
                    const outputEl = document.getElementById('client-info');
                    outputEl.innerHTML = 'Error: check console for more information';
                    console.error(evt);
                } else {
                    document.getElementById('client-info').innerHTML = evt;
                }
            };

            incppect.k_requests_update_freq_ms = "16";
            incppect.init();

            imgui_ws.set_incppect_handlers(incppect);
            imgui_ws.init('canvas_main');
        }
        window.addEventListener('load', init);

    </script>
</body>
</html>
